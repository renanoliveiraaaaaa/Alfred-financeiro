name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key

  supabase-types:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase
        run: supabase start -x imgproxy,studio,edge-runtime,logflare,vector,supavisor

      - name: Check types are in sync
        run: |
          supabase gen types typescript --local > types/supabase.generated.ts
          diff -u types/supabase.ts types/supabase.generated.ts || (
            echo "::error::types/supabase.ts is out of sync. Run: npm run gen:types"
            exit 1
          )
